<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consent Form Library — Cook County Health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #1A6FC4;
      --blue-mid: #3B8FE8;
      --blue-light: #E3F0FC;
      --blue-dark: #0D4A8A;
      --green: #1E7A3E;
      --green-light: #D6F0E0;
      --amber: #A05C00;
      --amber-light: #FEF0D6;
      --red: #C0392B;
      --red-light: #FDECEA;
      --teal: #0E7C6B;
      --teal-light: #D4F4EE;
      --purple: #5B3EC8;
      --purple-light: #EDE8FC;
      --orange: #D4500A;
      --orange-light: #FDEEDE;
      --gray-50: #F4F6FB;
      --gray-100: #E8ECF5;
      --gray-200: #C8CFE0;
      --gray-400: #7A849A;
      --gray-600: #4A5268;
      --gray-800: #1E2235;
      --white: #ffffff;
      --border: rgba(30,34,53,0.10);
      --border-strong: rgba(30,34,53,0.20);
      --shadow-sm: 0 1px 3px rgba(30,34,53,0.07), 0 1px 2px rgba(30,34,53,0.05);
      --shadow-md: 0 4px 16px rgba(30,34,53,0.10), 0 2px 6px rgba(30,34,53,0.06);
      --shadow-lg: 0 12px 40px rgba(30,34,53,0.14), 0 4px 12px rgba(30,34,53,0.08);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --font: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'DM Mono', monospace;
      --topbar-h: 62px;
    }

    html { font-size: 15px; }
    body {
      font-family: var(--font);
      background: linear-gradient(160deg, #EEF3FC 0%, #F4F6FB 60%, #EDF6F0 100%);
      color: var(--gray-800);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: var(--topbar-h);
      background: linear-gradient(135deg, #0D4A8A 0%, #1A6FC4 60%, #2196d3 100%);
      border-bottom: none;
      box-shadow: 0 2px 12px rgba(13,74,138,0.35);
      display: flex; align-items: center; gap: 1rem; padding: 0 1.5rem;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 15px; font-weight: 600; color: #fff;
      white-space: nowrap; text-decoration: none;
    }
    .logo-icon {
      width: 38px; height: 38px; border-radius: var(--radius-md);
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .logo-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-md); }
    .logo-sub { font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.7); display: block; }
    .search-wrap {
      flex: 1; max-width: 500px; position: relative;
    }
    .search-wrap input {
      width: 100%; height: 40px;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: var(--radius-xl);
      padding: 0 16px 0 42px;
      font-family: var(--font); font-size: 14px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      transition: border-color .15s, box-shadow .15s, background .15s;
      outline: none;
    }
    .search-wrap input:focus {
      border-color: rgba(255,255,255,0.7);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.22);
    }
    .search-wrap input::placeholder { color: rgba(255,255,255,0.6); }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,0.7); font-size: 15px; pointer-events: none;
    }
    .search-clear {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: var(--gray-400); font-size: 13px; cursor: pointer;
      background: none; border: none; padding: 4px; display: none;
    }
    .search-clear:hover { color: var(--gray-800); }
    .topnav { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    .tab {
      font-family: var(--font); font-size: 13px; font-weight: 500;
      padding: 7px 16px; border-radius: var(--radius-xl);
      cursor: pointer; border: none; background: transparent;
      color: rgba(255,255,255,0.75); transition: all .15s; white-space: nowrap;
    }
    .tab:hover:not(.active) { background: rgba(255,255,255,0.15); color: #fff; }
    .tab.active { background: #fff; color: var(--blue-dark); font-weight: 600; }

    /* ── LAYOUT ── */
    .layout {
      display: flex; margin-top: var(--topbar-h); min-height: calc(100vh - var(--topbar-h));
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 230px; min-width: 230px; flex-shrink: 0;
      background: linear-gradient(180deg, #f0f4ff 0%, #f8f9fe 100%);
      border-right: 1px solid var(--border);
      padding: 1.25rem 1rem 2rem;
      position: sticky; top: var(--topbar-h);
      height: calc(100vh - var(--topbar-h));
      overflow-y: auto;
    }
    .sidebar-section { margin-bottom: 1.5rem; }
    .sidebar-label {
      font-size: 10px; font-weight: 600; color: var(--gray-400);
      text-transform: uppercase; letter-spacing: .08em;
      padding: 0 8px; margin-bottom: 6px;
    }
    .filter-btn {
      width: 100%; text-align: left; border: none; background: transparent;
      padding: 7px 10px; border-radius: var(--radius-md);
      font-family: var(--font); font-size: 13px; color: var(--gray-600);
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: all .12s; line-height: 1.3;
    }
    .filter-btn i { font-size: 14px; width: 16px; text-align: center; flex-shrink: 0; }
    .filter-btn:hover { background: var(--gray-100); color: var(--gray-800); }
    .filter-btn.active { background: var(--blue); color: #fff; font-weight: 500; border-radius: var(--radius-md); }
    .filter-btn .count {
      margin-left: auto; font-size: 11px; background: var(--gray-100);
      color: var(--gray-600); padding: 1px 7px; border-radius: 100px;
    }
    .filter-btn.active .count { background: rgba(24,95,165,0.15); color: var(--blue); }

    /* ── MAIN CONTENT ── */
    .content { flex: 1; padding: 1.5rem 1.75rem; min-width: 0; }
    .page-head { margin-bottom: 1.25rem; }
    .page-title { font-size: 20px; font-weight: 600; color: var(--gray-800); margin-bottom: 2px; }
    .page-sub { font-size: 13px; color: var(--gray-400); }

    /* ── CHIPS ── */
    .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 500; padding: 4px 10px;
      border-radius: 100px; background: var(--blue-light);
      color: var(--blue); border: 1px solid rgba(55,138,221,0.25);
      cursor: pointer; transition: all .12s;
    }
    .chip:hover { background: rgba(55,138,221,0.2); }
    .chip i { font-size: 11px; }

    /* ── RESULTS COUNT ── */
    .results-count { font-size: 12px; color: var(--gray-400); margin-bottom: 1rem; }

    /* ── FORM CARDS ── */
    .form-grid { display: flex; flex-direction: column; gap: 10px; }
    .form-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-left: 4px solid var(--blue);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      cursor: pointer;
      transition: all .15s;
      display: flex; align-items: flex-start; gap: 1rem;
      box-shadow: var(--shadow-sm);
    }
    .form-card:hover {
      border-color: var(--blue-mid);
      border-left-color: var(--blue-mid);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    .form-card.retired { opacity: .55; pointer-events: none; }
    .form-card.pending-approval { opacity: .55; pointer-events: none; }
    .form-icon {
      width: 42px; height: 42px; border-radius: var(--radius-md);
      background: var(--blue-light); display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .form-icon i { font-size: 18px; color: var(--blue); }
    .form-info { flex: 1; min-width: 0; }
    .form-title {
      font-size: 14px; font-weight: 500; color: var(--gray-800);
      margin-bottom: 6px; line-height: 1.4;
    }
    .form-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 500;
      padding: 3px 9px; border-radius: 100px;
    }
    .badge i { font-size: 10px; }
    .badge-current { background: var(--green-light); color: var(--green); }
    .badge-retired { background: var(--red-light); color: var(--red); }
    .badge-pending { background: var(--amber-light); color: var(--amber); }
    .badge-review { background: var(--amber-light); color: var(--amber); }
    .badge-lang { background: var(--gray-100); color: var(--gray-600); border: 1px solid var(--border); }
    .badge-dept { background: var(--purple-light); color: var(--purple); }
    .form-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
    .btn-icon {
      width: 34px; height: 34px; border-radius: var(--radius-md);
      border: 1px solid var(--border-strong); background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--gray-600); transition: all .12s;
      font-size: 15px;
    }
    .btn-icon:hover { background: var(--gray-100); color: var(--gray-800); border-color: var(--blue-mid); }
    .btn-icon.fav.active { color: #E24B4A; border-color: #E24B4A; background: #FCEBEB; }
    .btn-icon.loading { pointer-events: none; }
    .do-not-use {
      display: flex; align-items: center; gap: 6px;
      background: var(--red-light); border: 1px solid rgba(224,75,74,0.3);
      border-radius: var(--radius-sm); padding: 5px 10px;
      font-size: 11px; font-weight: 600; color: var(--red);
      margin-bottom: 6px; letter-spacing: .02em; text-transform: uppercase;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 500; display: none;
      align-items: center; justify-content: center; padding: 1.5rem;
      backdrop-filter: blur(2px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white); border-radius: var(--radius-xl);
      width: 100%; max-width: 660px; max-height: 88vh;
      overflow-y: auto; box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      animation: modalIn .2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(12px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal-head {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
      position: sticky; top: 0; background: var(--white); z-index: 10;
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; line-height: 1.4; }
    .modal-body { padding: 1.5rem; }
    .modal-section { margin-bottom: 1.75rem; }
    .modal-section:last-child { margin-bottom: 0; }
    .modal-section-label {
      font-size: 10px; font-weight: 600; color: var(--gray-400);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px;
    }
    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0;
      border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden;
    }
    .info-cell {
      padding: 10px 14px; font-size: 13px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .info-cell:nth-child(even) { border-right: none; }
    .info-cell:nth-last-child(-n+2) { border-bottom: none; }
    .info-cell-label { font-size: 11px; color: var(--gray-400); margin-bottom: 2px; }
    .info-cell-val { font-weight: 500; }
    .info-cell-val.warn { color: var(--amber); }
    .info-cell-val.ok { color: var(--green); }
    .dl-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: var(--radius-md);
      background: var(--blue); color: #fff; border: none;
      font-family: var(--font); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .15s; text-decoration: none;
    }
    .dl-btn:hover { background: var(--blue-dark); }
    .dl-btn i { font-size: 15px; }
    .dl-btn.loading { background: var(--gray-200); color: var(--gray-600); pointer-events: none; }
    .version-list { display: flex; flex-direction: column; gap: 6px; }
    .version-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: var(--radius-md);
      font-size: 13px; border: 1px solid var(--border);
    }
    .version-item.current { background: var(--green-light); border-color: rgba(59,109,17,0.2); }
    .version-item.old { background: var(--gray-50); opacity: .75; }
    .version-ver { font-family: var(--font-mono); font-weight: 500; min-width: 38px; font-size: 12px; }
    .version-note { flex: 1; color: var(--gray-600); }
    .version-date { font-size: 11px; color: var(--gray-400); white-space: nowrap; }

    /* ── DASHBOARD ── */
    .stat-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px; margin-bottom: 1.75rem;
    }
    .stat-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.1rem 1.25rem;
      box-shadow: var(--shadow-sm);
    }
    .stat-label { font-size: 11px; color: var(--gray-400); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
    .stat-num { font-size: 28px; font-weight: 600; line-height: 1; }
    .stat-num.ok { color: var(--green); }
    .stat-num.warn { color: var(--amber); }
    .stat-num.danger { color: var(--red); }
    .stat-num.blue { color: var(--blue); }
    .stat-sub { font-size: 11px; color: var(--gray-400); margin-top: 4px; }
    .alert-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.75rem; }
    .alert-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 14px; border-radius: var(--radius-md);
      font-size: 13px; border: 1px solid transparent;
    }
    .alert-warn { background: var(--amber-light); color: #633806; border-color: rgba(133,79,11,.2); }
    .alert-info { background: var(--blue-light); color: var(--blue-dark); border-color: rgba(55,138,221,.2); }
    .alert-ok { background: var(--green-light); color: var(--green); border-color: rgba(59,109,17,.2); }
    .alert-item i { font-size: 15px; margin-top: 1px; flex-shrink: 0; }
    .dash-section-title { font-size: 14px; font-weight: 600; margin-bottom: .75rem; color: var(--gray-800); }

    /* ── LOADING / EMPTY ── */
    .loading-state, .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 4rem 2rem; gap: 12px;
      color: var(--gray-400); text-align: center;
    }
    .loading-state .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border); border-top-color: var(--blue);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state i { font-size: 36px; opacity: .35; }
    .empty-state p { font-size: 14px; }

    /* ── MOBILE ── */
    @media (max-width: 700px) {
      .sidebar { display: none; }
      .topnav .tab:not(.active) { display: none; }
      .content { padding: 1rem; }
      .topbar { padding: 0 1rem; gap: .75rem; }
      .logo-sub { display: none; }
      .info-grid { grid-template-columns: 1fr; }
      .info-cell:nth-child(even) { border-right: none; }
      .info-cell:nth-last-child(-n+2) { border-bottom: 1px solid var(--border); }
      .info-cell:last-child { border-bottom: none; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
    }

    /* ── SPINNER INLINE ── */
    .spin-sm {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle;
    }
    .spin-dark {
      border: 2px solid var(--border); border-top-color: var(--blue);
    }
  </style>
</head>

        <div id="modalBadges" style="display:flex;gap:6px;flex-wrap:wrap;"></div>

      <button class="btn-icon" onclick="closeModal()" aria-label="Close dialog" style="flex-shrink:0">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  CONFIG  — edit these to update credentials / sheet
// ─────────────────────────────────────────────────────────────────────────────
const SS_SHEET_ID = "8828128179736452";

// ── API base — points to your Render back-end. ────────────────────────────────
// Replace the URL below with your actual Render service URL.
// e.g. "https://cch-consent-forms.onrender.com"
window.API_BASE   = "https://consent-4jy5.onrender.com";
const API_BASE    = window.API_BASE;
const SS_BASE     = API_BASE + "/api/smartsheet";

// ─────────────────────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────────────────────
let allForms   = [];
let favorites  = JSON.parse(localStorage.getItem('cch_favs')  || '[]');
let recentIds  = JSON.parse(localStorage.getItem('cch_recent')|| '[]');
let activeFilters = { status:'all', dept:'all', lang:'all' };
let searchQuery   = '';
let currentView   = 'library';

// ─────────────────────────────────────────────────────────────────────────────
//  SMARTSHEET FETCH
// ─────────────────────────────────────────────────────────────────────────────
async function loadForms() {
  try {
    const resp = await fetch(`${SS_BASE}/sheets/${SS_SHEET_ID}?include=attachments`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
    const data = await resp.json();

    // Build column ID → name map
    const colMap = {};
    (data.columns || []).forEach(c => { colMap[c.id] = c.title; });

    allForms = (data.rows || []).map(row => {
      // Extract all cell values
      const cells = {};
      (row.cells || []).forEach(c => {
        const name = colMap[c.columnId];
        if (name) cells[name] = c.displayValue ?? c.value ?? '';
      });

      // ── Primary title ──
      const title = cells['Consent Title']
        || cells['Form Title']
        || cells['Title']
        || cells[Object.keys(cells)[0]]
        || 'Untitled';

      // ── Metadata — use sheet columns when available, fall back to defaults ──
      const dept        = cells['Department']     || cells['Dept']       || inferDept(title);
      const language    = cells['Language']       || cells['Lang']       || 'English';
      const version     = cells['Version']        || cells['Ver']        || '1.0';
      const renewalFlag   = cells['Renewal Flag'] || cells['Review Flag'] || cells['Renewal'] || '';
      const status      = normalizeStatus(cells['Status'] || cells['Form Status'] || '', renewalFlag);
      const approved    = cells['Approval Date']  || cells['Approved']   || '';
      const nextReview  = cells['Next Review Date']|| cells['Review Date']|| '';
      const changeSummary = cells['Change Summary']|| cells['Changes']   || '';
      const downloads   = parseInt(cells['Downloads'] || cells['Download Count'] || '0', 10) || 0;
      const missingTrans  = cells['Missing Translations'] || cells['Needs Translation'] || '';

      const attachments = row.attachments || [];

      return {
        id: row.id,
        title,
        dept,
        language,
        version,
        status,
        approved,
        nextReview,
        changeSummary,
        downloads,
        missingTrans,
        renewalFlag,
        attachments,
        history: buildHistory(cells, version, approved, changeSummary)
      };
    });

    populateDynamicFilters();
    updateStatusCounts();
    document.getElementById('initialLoad').style.display = 'none';
    renderView();

  } catch(err) {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <p><strong>Could not load forms from Smartsheet</strong></p>
        <p style="font-size:12px;margin-top:4px">${err.message}</p>
        <p style="font-size:12px;color:#888;margin-top:8px">Check that the API key is valid and the sheet is accessible.</p>
      </div>`;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function normalizeStatus(raw, renewalFlag) {
  // Check renewal flag first — if it says review in 30/90 days, treat as review
  if (renewalFlag) {
    const rf = renewalFlag.toLowerCase().trim();
    if (rf.includes('review in 90') || rf.includes('review in 30') || rf.includes('review')) return 'review';
  }
  if (!raw) return 'current';
  const s = raw.toLowerCase().trim();
  if (s.includes('current') || s.includes('approved') || s.includes('active')) return 'current';
  if (s.includes('retire') || s.includes('obsolete') || s.includes('expired') || s.includes('do not use')) return 'retired';
  if (s.includes('pending') || s.includes('draft')) return 'pending';
  if (s.includes('review') || s.includes('due')) return 'review';
  return 'current';
}

function inferDept(title) {
  const t = title.toLowerCase();
  if (t.includes('surgery') || t.includes('surgical') || t.includes('operation')) return 'Surgery';
  if (t.includes('anesthesia') || t.includes('anaesthesia')) return 'Anesthesia';
  if (t.includes('transfusion') || t.includes('blood') || t.includes('platelet')) return 'Hematology';
  if (t.includes('dnr') || t.includes('resuscitate') || t.includes('icu') || t.includes('critical')) return 'ICU / Critical Care';
  if (t.includes('retina') || t.includes('eye') || t.includes('ophthalmol') || t.includes('cataract')) return 'Ophthalmology';
  if (t.includes('radiology') || t.includes('imaging') || t.includes('mri') || t.includes('ct scan')) return 'Radiology';
  if (t.includes('cardiac') || t.includes('cardio') || t.includes('heart')) return 'Cardiology';
  if (t.includes('psych') || t.includes('mental') || t.includes('behavioral')) return 'Psychiatry';
  if (t.includes('pediatric') || t.includes('child') || t.includes('minor')) return 'Pediatrics';
  if (t.includes('against medical') || t.includes('ama') || t.includes('discharge')) return 'General Medicine';
  return 'General Medicine';
}

function buildHistory(cells, version, approved, summary) {
  const history = [];
  // Current version
  history.push({ v: version || '1.0', date: approved || '', note: summary || 'Current approved version' });
  // If sheet has explicit prior version columns
  if (cells['Prior Version']) history.push({ v: cells['Prior Version'], date: cells['Prior Approval Date'] || '', note: cells['Prior Change Summary'] || 'Prior version' });
  return history;
}

function populateDynamicFilters() {
  const depts = [...new Set(allForms.map(f => f.dept).filter(Boolean))].sort();
  const langs = [...new Set(allForms.map(f => f.language).filter(Boolean))].sort();

  const deptEl = document.getElementById('deptFilters');
  const deptIcons = { 'Surgery':'fa-scalpel','Anesthesia':'fa-syringe','Hematology':'fa-droplet','ICU / Critical Care':'fa-heart-pulse','Ophthalmology':'fa-eye','Radiology':'fa-x-ray','Cardiology':'fa-heart','Psychiatry':'fa-brain','Pediatrics':'fa-child','General Medicine':'fa-stethoscope' };
  deptEl.innerHTML = depts.map(d => `
    <button class="filter-btn" onclick="setSideFilter('dept','${d}',this)">
      <i class="fa-solid ${deptIcons[d]||'fa-building-columns'}"></i> ${d}
    </button>`).join('');

  const langEl = document.getElementById('langFilters');
  const langIcons = { 'English':'🇺🇸','Spanish':'🇲🇽','Polish':'🇵🇱','Arabic':'🇸🇦','Chinese':'🇨🇳','French':'🇫🇷','Korean':'🇰🇷','Vietnamese':'🇻🇳' };
  langEl.innerHTML = langs.map(l => `
    <button class="filter-btn" onclick="setSideFilter('lang','${l}',this)">
      <span style="font-size:13px">${langIcons[l]||'🌐'}</span> ${l}
    </button>`).join('');
}

function updateStatusCounts() {
  document.getElementById('count-all').textContent     = allForms.length;
  document.getElementById('count-current').textContent = allForms.filter(f=>f.status==='current').length;
  document.getElementById('count-review').textContent  = allForms.filter(f=>f.status==='review').length;
  document.getElementById('count-pending').textContent = allForms.filter(f=>f.status==='pending').length;
  document.getElementById('count-retired').textContent = allForms.filter(f=>f.status==='retired').length;
}

// ─────────────────────────────────────────────────────────────────────────────
//  FILTERING
// ─────────────────────────────────────────────────────────────────────────────
function getFilteredForms() {
  return allForms.filter(f => {
    // Hide retired and pending from general/search views unless explicitly filtered
    if (f.status === 'retired' && activeFilters.status !== 'retired') return false;
    if (f.status === 'pending' && activeFilters.status !== 'pending') return false;
    if (activeFilters.status !== 'all' && f.status !== activeFilters.status) return false;
    if (activeFilters.dept !== 'all' && f.dept !== activeFilters.dept) return false;
    if (activeFilters.lang !== 'all' && !f.language.toLowerCase().includes(activeFilters.lang.toLowerCase())) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return f.title.toLowerCase().includes(q)
        || f.dept.toLowerCase().includes(q)
        || f.language.toLowerCase().includes(q)
        || (f.changeSummary && f.changeSummary.toLowerCase().includes(q));
    }
    return true;
  });
}

// ─────────────────────────────────────────────────────────────────────────────
//  RENDER LIBRARY
// ─────────────────────────────────────────────────────────────────────────────
function renderLibrary(forms) {
  const data = forms || getFilteredForms();
  const mc   = document.getElementById('mainContent');

  let chipsHTML = '';
  if (activeFilters.dept !== 'all') chipsHTML += `<span class="chip" onclick="setSideFilter('dept','all',null)"><i class="fa-solid fa-xmark"></i> ${activeFilters.dept}</span>`;
  if (activeFilters.lang !== 'all') chipsHTML += `<span class="chip" onclick="setSideFilter('lang','all',null)"><i class="fa-solid fa-xmark"></i> ${activeFilters.lang}</span>`;
  if (activeFilters.status !== 'all') chipsHTML += `<span class="chip" onclick="setSideFilter('status','all',null)"><i class="fa-solid fa-xmark"></i> ${activeFilters.status}</span>`;

  mc.innerHTML = `
    <div class="page-head">
      <div class="page-title">Consent Form Library</div>
      <div class="page-sub">Cook County Health — All active approved forms</div>
    </div>
    ${chipsHTML ? `<div class="chips">${chipsHTML}</div>` : ''}
    <div class="results-count">${data.length} form${data.length !== 1 ? 's' : ''} found</div>
    <div class="form-grid" id="formGrid">
      ${data.length ? data.map(f => formCardHTML(f)).join('') : `
        <div class="empty-state">
          <i class="fa-solid fa-file-circle-xmark"></i>
          <p>No forms match your search or filters</p>
        </div>`}
    </div>`;
}

function formCardHTML(f) {
  const isFav   = favorites.includes(f.id);
  const isDue   = f.status === 'review';
  const isRetired = f.status === 'retired';
  const isPending = f.status === 'pending';
  const isBlocked = isRetired || isPending;
  const hasDl   = f.attachments && f.attachments.length > 0;

  return `
    <div class="form-card${isRetired ? ' retired' : isPending ? ' pending-approval' : ''}"
         onclick="${isBlocked ? '' : `openModal(${f.id})`}"
         role="${isBlocked ? 'presentation' : 'button'}"
         tabindex="${isBlocked ? '-1' : '0'}"
         ${isBlocked ? '' : `onkeydown="if(event.key==='Enter'||event.key===' ')openModal(${f.id})"`}
         aria-label="${isBlocked ? f.title : `Open ${f.title}`}">
      ${isRetired ? `<div class="do-not-use"><i class="fa-solid fa-ban"></i> Do not use — Retired Form</div>` : ''}
      ${isPending ? `<div class="do-not-use" style="background:var(--amber-light);border-color:rgba(133,79,11,.3);color:var(--amber)"><i class="fa-solid fa-lock"></i> Do not use — Pending Approval</div>` : ''}
      <div class="form-icon"><i class="fa-solid fa-file-waveform"></i></div>
      <div class="form-info">
        <div class="form-title">${f.title}</div>
        <div class="form-meta">
          <span class="badge badge-${isRetired?'retired':f.status==='current'?'current':f.status==='review'?'review':'pending'}">
            <i class="fa-solid fa-${isRetired?'circle-xmark':isPending?'lock':f.status==='current'?'circle-check':f.status==='review'?'clock':'hourglass-half'}"></i>
            ${isRetired ? 'Retired' : isPending ? 'Pending Approval' : f.status==='current' ? `v${f.version} — Current` : `v${f.version} — Review due`}
          </span>
          <span class="badge badge-dept"><i class="fa-solid fa-building-columns"></i> ${f.dept}</span>
          <span class="badge badge-lang"><i class="fa-solid fa-language"></i> ${f.language}</span>
          ${isDue && f.nextReview ? `<span class="badge badge-review"><i class="fa-solid fa-triangle-exclamation"></i> Review: ${f.nextReview}</span>` : ''}
        </div>
      </div>
      <div class="form-actions" onclick="event.stopPropagation()" role="group" aria-label="Form actions">
        ${hasDl && !isBlocked ? `
        <button class="btn-icon" id="prev-card-btn-${f.id}"
          onclick="previewForm(${f.id}, ${f.attachments[0].id}, this)"
          title="Preview PDF"
          aria-label="Preview ${f.title}"
          style="color:var(--teal);border-color:var(--teal)">
          <i class="fa-solid fa-eye"></i>
        </button>
        <button class="btn-icon" id="dl-btn-${f.id}"
          onclick="downloadForm(${f.id}, ${f.attachments[0].id}, this)"
          title="Download PDF"
          aria-label="Download ${f.title} PDF">
          <i class="fa-solid fa-download"></i>
        </button>` : ''}
      </div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
//  RENDER DASHBOARD
// ─────────────────────────────────────────────────────────────────────────────
function renderDashboard() {
  const mc       = document.getElementById('mainContent');
  const total    = allForms.length;
  const current  = allForms.filter(f => f.status === 'current').length;
  const review   = allForms.filter(f => f.status === 'review').length;
  const pending  = allForms.filter(f => f.status === 'pending').length;
  const retired  = allForms.filter(f => f.status === 'retired').length;
  const missing  = allForms.filter(f => f.missingTrans && f.missingTrans.trim()).length;
  const sorted   = [...allForms].sort((a,b) => b.downloads - a.downloads);

  // Renewal Flag — pick up "Review in 30 Days" and "Review in 90 Days" from Smartsheet
  const due30  = allForms.filter(f => f.renewalFlag && f.renewalFlag.toLowerCase().includes('review in 30'));
  const due90  = allForms.filter(f => f.renewalFlag && f.renewalFlag.toLowerCase().includes('review in 90'));

  const alerts = [];
  if (due30.length) alerts.push(`<div class="alert-item alert-warn" style="border-left:4px solid var(--red)"><i class="fa-solid fa-fire" style="color:var(--red)"></i><div><strong style="color:var(--red)">${due30.length} form${due30.length>1?'s':''} — Review in 30 Days (Urgent):</strong><br><span style="font-size:12px">${due30.map(f=>f.title).join('<br>')}</span></div></div>`);
  if (due90.length) alerts.push(`<div class="alert-item alert-warn"><i class="fa-solid fa-triangle-exclamation"></i><div><strong>${due90.length} form${due90.length>1?'s':''} — Review in 90 Days:</strong><br><span style="font-size:12px">${due90.map(f=>f.title).join('<br>')}</span></div></div>`);
  if (pending) alerts.push(`<div class="alert-item alert-info"><i class="fa-solid fa-hourglass-half"></i><div><strong>${pending} form${pending>1?'s':''} pending department approval</strong></div></div>`);
  if (!due30.length && !due90.length && !pending) alerts.push(`<div class="alert-item alert-ok"><i class="fa-solid fa-circle-check"></i><strong>All forms are current — no action required</strong></div>`);

  mc.innerHTML = `
    <div class="page-head">
      <div class="page-title">Department Dashboard</div>
      <div class="page-sub">Overview of all consent form activity</div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Active forms</div><div class="stat-num ok">${current}</div><div class="stat-sub">Current &amp; approved</div></div>
      <div class="stat-card"><div class="stat-label">Total forms</div><div class="stat-num blue">${total}</div><div class="stat-sub">In Smartsheet</div></div>
      <div class="stat-card"><div class="stat-label">Review in 30 Days</div><div class="stat-num ${due30.length?'danger':'ok'}">${due30.length}</div><div class="stat-sub">Urgent renewal</div></div>
      <div class="stat-card"><div class="stat-label">Review in 90 Days</div><div class="stat-num ${due90.length?'warn':'ok'}">${due90.length}</div><div class="stat-sub">Upcoming renewal</div></div>
      <div class="stat-card"><div class="stat-label">Pending approval</div><div class="stat-num ${pending?'warn':'ok'}">${pending}</div><div class="stat-sub">Awaiting sign-off</div></div>
      <div class="stat-card"><div class="stat-label">Retired forms</div><div class="stat-num ${retired?'danger':'ok'}">${retired}</div><div class="stat-sub">Suppressed from search</div></div>
    </div>
    <div class="dash-section-title">Active alerts</div>
    <div class="alert-list">${alerts.join('')}</div>
`;
}

// ─────────────────────────────────────────────────────────────────────────────
//  RENDER FAVORITES
// ─────────────────────────────────────────────────────────────────────────────
function renderFavorites() {
  const mc   = document.getElementById('mainContent');
  const favs = allForms.filter(f => favorites.includes(f.id));
  mc.innerHTML = `
    <div class="page-head">
      <div class="page-title">My Favorites</div>
      <div class="page-sub">Forms you've saved for quick access</div>
    </div>
    <div class="form-grid">
      ${favs.length ? favs.map(f => formCardHTML(f)).join('') : `
        <div class="empty-state">
          <i class="fa-regular fa-heart"></i>
          <p>No favorites yet</p>
          <p style="font-size:12px">Click the <i class="fa-regular fa-heart"></i> icon on any form to save it here</p>
        </div>`}
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────────────────────────────────────
function openModal(rowId) {
  const f = allForms.find(x => x.id === rowId);
  if (!f) return;
  // Block modal for pending and retired forms
  if (f.status === 'pending' || f.status === 'retired') return;
  addRecent(rowId);

  document.getElementById('modalTitleText').textContent = f.title;
  document.getElementById('modalBadges').innerHTML = `
    <span class="badge badge-${f.status==='current'?'current':f.status==='retired'?'retired':f.status==='pending'?'pending':'review'}">
      <i class="fa-solid fa-${f.status==='current'?'circle-check':f.status==='retired'?'circle-xmark':f.status==='pending'?'lock':'clock'}"></i>
      v${f.version} — ${f.status==='current'?'Current Approved':f.status==='retired'?'Retired':f.status==='pending'?'Pending Approval':'Review Due'}
    </span>
    <span class="badge badge-dept">${f.dept}</span>
    <span class="badge badge-lang">${f.language}</span>`;

  const hasDl = f.attachments && f.attachments.length > 0;
  const attHTML = hasDl
    ? f.attachments.map((a,i) => `
        <div style="margin-bottom:${i>0?'12px':'0'}">
          <div style="font-size:12px;color:var(--gray-400);margin-bottom:6px;font-weight:500">
            <i class="fa-solid fa-file-pdf" style="color:var(--red)"></i> ${a.name}
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="dl-btn" id="modal-dl-${f.id}-${a.id}" onclick="downloadForm(${f.id},${a.id},this)">
              <i class="fa-solid fa-download"></i> Download
            </button>
            <button class="dl-btn" style="background:var(--teal)" id="prev-btn-${f.id}-${a.id}" onclick="previewForm(${f.id},${a.id},this)">
              <i class="fa-solid fa-eye"></i> Open Preview
            </button>
          </div>
          <div style="margin-top:8px;font-size:11px;color:var(--gray-400)">
            <i class="fa-solid fa-circle-info"></i> Preview opens in a new tab with full zoom, print &amp; scroll controls
          </div>
        </div>`).join('')
    : `<p style="font-size:13px;color:var(--gray-400)">No file attachments on record</p>`;

  const histHTML = (f.history || []).map((h, i) => `
    <div class="version-item ${i===0?'current':'old'}">
      <span class="version-ver">v${h.v}</span>
      <span class="version-note">${h.note || '—'}</span>
      <span class="version-date">${h.date}</span>
      <span class="badge badge-${i===0?'current':'retired'}" style="font-size:10px">${i===0?'current':'retired'}</span>
    </div>`).join('');

  const nextReviewClass = f.status === 'review' ? 'warn' : 'ok';

  document.getElementById('modalBody').innerHTML = `
    ${f.status==='retired' ? `<div class="do-not-use" style="margin-bottom:1.25rem;font-size:12px;padding:10px 14px"><i class="fa-solid fa-ban"></i> This form has been retired. Do not use for new consents.</div>` : ''}
    <div class="modal-section">
      <div class="modal-section-label">Form details</div>
      <div class="info-grid">
        <div class="info-cell"><div class="info-cell-label">Department</div><div class="info-cell-val">${f.dept}</div></div>
        <div class="info-cell"><div class="info-cell-label">Language</div><div class="info-cell-val">${f.language}</div></div>
        <div class="info-cell"><div class="info-cell-label">Current version</div><div class="info-cell-val">v${f.version}</div></div>
        <div class="info-cell"><div class="info-cell-label">Approval date</div><div class="info-cell-val">${f.approved || '—'}</div></div>
        <div class="info-cell"><div class="info-cell-label">Next review date</div><div class="info-cell-val ${nextReviewClass}">${f.nextReview || '—'}${f.status==='review'?' ⚠':''}</div></div>
      </div>
      ${f.changeSummary ? `<div style="margin-top:10px;padding:10px 14px;background:var(--blue-light);border-radius:var(--radius-md);font-size:13px;color:var(--blue-dark)"><strong>Change summary:</strong> ${f.changeSummary}</div>` : ''}
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Download consent form</div>
      ${attHTML}
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Version history</div>
      <div class="version-list">
        ${histHTML || '<p style="font-size:13px;color:var(--gray-400)">No version history available</p>'}
      </div>
    </div>`;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─────────────────────────────────────────────────────────────────────────────
//  DOWNLOAD
// ─────────────────────────────────────────────────────────────────────────────
async function downloadForm(rowId, attachId, btn) {
  const orig = btn.innerHTML;
  btn.innerHTML = btn.classList.contains('dl-btn')
    ? `<span class="spin-sm"></span> Downloading…`
    : `<span class="spin-sm spin-dark"></span>`;
  btn.classList.add('loading');

  try {
    // Step 1: Get the signed S3 URL via our server proxy
    const metaResp = await fetch(`${SS_BASE}/sheets/${SS_SHEET_ID}/attachments/${attachId}`);
    if (!metaResp.ok) throw new Error(`Server returned HTTP ${metaResp.status}`);
    const data = await metaResp.json();
    if (!data.url) throw new Error('No download URL returned from server');

    // Step 2: Route through /api/pdf-proxy?download=1
    // Server sets Content-Disposition: attachment so browser saves the file
    const downloadUrl = `${API_BASE}/api/pdf-proxy?download=1&url=${encodeURIComponent(data.url)}`;
    const link = document.createElement('a');
    link.href = downloadUrl;
    link.download = 'consent-form.pdf';
    document.body.appendChild(link);
    link.click();
    setTimeout(() => document.body.removeChild(link), 100);
    addRecent(rowId);

  } catch(e) {
    alert('Download failed: ' + e.message);
  }

  btn.innerHTML = orig;
  btn.classList.remove('loading');
}

// ─────────────────────────────────────────────────────────────────────────────
//  VIEW SWITCHING
// ─────────────────────────────────────────────────────────────────────────────
function renderView() {
  if (currentView === 'library')   renderLibrary();
  else if (currentView === 'dashboard') renderDashboard();
  else if (currentView === 'favorites') renderFavorites();
}

function switchView(view, btn) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else {
    const el = document.getElementById(`tab-${view}`);
    if (el) el.classList.add('active');
  }
  renderView();
}

// ─────────────────────────────────────────────────────────────────────────────
//  FILTERS
// ─────────────────────────────────────────────────────────────────────────────
function setSideFilter(type, val, btn) {
  activeFilters[type] = val;
  // Reset all buttons of this category
  if (type === 'status') {
    ['sf-all','sf-current','sf-review','sf-pending','sf-retired'].forEach(id => {
      const el = document.getElementById(id); if(el) el.classList.remove('active');
    });
  } else if (type === 'dept') {
    document.getElementById('df-all').classList.remove('active');
    document.querySelectorAll('#deptFilters .filter-btn').forEach(b => b.classList.remove('active'));
  } else if (type === 'lang') {
    document.getElementById('lf-all').classList.remove('active');
    document.querySelectorAll('#langFilters .filter-btn').forEach(b => b.classList.remove('active'));
  }
  if (btn) btn.classList.add('active');
  if (currentView !== 'library') switchView('library', document.getElementById('tab-library'));
  else renderLibrary();
}

// ─────────────────────────────────────────────────────────────────────────────
//  SEARCH
// ─────────────────────────────────────────────────────────────────────────────
function handleSearch(val) {
  searchQuery = val.trim();
  document.getElementById('searchClear').style.display = searchQuery ? 'block' : 'none';
  if (currentView !== 'library') switchView('library', document.getElementById('tab-library'));
  else renderLibrary();
}

function clearSearch() {
  document.getElementById('globalSearch').value = '';
  searchQuery = '';
  document.getElementById('searchClear').style.display = 'none';
  renderLibrary();
}

// ─────────────────────────────────────────────────────────────────────────────
//  FAVORITES & RECENT
// ─────────────────────────────────────────────────────────────────────────────
function toggleFav(id, btn) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(x => x !== id);
    btn.classList.remove('active');
    btn.querySelector('i').className = 'fa-regular fa-heart';
    btn.title = 'Add to favorites';
  } else {
    favorites.push(id);
    btn.classList.add('active');
    btn.querySelector('i').className = 'fa-solid fa-heart';
    btn.title = 'Remove from favorites';
  }
  localStorage.setItem('cch_favs', JSON.stringify(favorites));
}

function addRecent(id) {
  recentIds = [id, ...recentIds.filter(x => x !== id)].slice(0, 15);
  localStorage.setItem('cch_recent', JSON.stringify(recentIds));
}

function showRecent() {
  const forms = recentIds.map(id => allForms.find(f => f.id === id)).filter(Boolean);
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
    <div class="page-head">
      <div class="page-title">Recently Used</div>

    </div>
    <div class="form-grid">
      ${forms.length ? forms.map(f => formCardHTML(f)).join('') : `
        <div class="empty-state">
          <i class="fa-solid fa-clock-rotate-left"></i>
          <p>No recently used forms yet</p>
        </div>`}
    </div>`;
}

function showMostUsed() {
  const sorted = [...allForms].sort((a,b) => b.downloads - a.downloads);
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
    <div class="page-head">
      <div class="page-title">Most Downloaded Forms</div>
      <div class="page-sub">Ranked by total download count</div>
    </div>
    <div class="form-grid">${sorted.map(f => formCardHTML(f)).join('')}</div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
//  PDF PREVIEW
// Opens the PDF as a blob in a new browser tab — gives full zoom, print,
// scroll controls via the browser's native PDF viewer.
// ─────────────────────────────────────────────────────────────────────────────
async function previewForm(rowId, attachId, btn) {
  const origLabel = btn.innerHTML;
  btn.innerHTML = btn.classList.contains('dl-btn')
    ? '<span class="spin-sm"></span> Loading…'
    : '<span class="spin-sm spin-dark"></span>';
  btn.disabled = true;

  try {
    // Step 1: Get the signed S3 URL via our server proxy
    const metaResp = await fetch(`${SS_BASE}/sheets/${SS_SHEET_ID}/attachments/${attachId}`);
    if (!metaResp.ok) throw new Error(`HTTP ${metaResp.status}`);
    const meta = await metaResp.json();
    if (!meta.url) throw new Error('No URL in response');

    // Step 2: Route through our server /api/pdf-proxy with NO download flag
    // Server sets Content-Disposition: inline so browser shows the PDF viewer
    // instead of triggering a file download
    const previewUrl = `${API_BASE}/api/pdf-proxy?url=${encodeURIComponent(meta.url)}`;
    const tab = window.open(previewUrl, '_blank');
    if (!tab) alert('Preview blocked by your browser. Please allow pop-ups for this site.');
    addRecent(rowId);

  } catch(e) {
    alert('Preview failed: ' + e.message);
  }

  btn.innerHTML = origLabel;
  btn.disabled = false;
}

//  INIT
// ─────────────────────────────────────────────────────────────────────────────

  function removeTyping() {
    var t = document.getElementById('codyTyping');
    if (t) t.remove();
  }

  // Create a conversation on first use, then send messages
  async function ensureConversation() {
    if (convId) return convId;
    var resp = await fetch(window.API_BASE + '/api/cody/conversation', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({})
    });
    var data = await resp.json();
    // Cody returns { data: { id: '...' } }
    convId = (data.data && data.data.id) ? data.data.id : null;
    return convId;
  }

  async function doSend() {
    var text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMsg(text, 'user');
    showTyping();
    try {
      var cid = await ensureConversation();
      if (!cid) throw new Error('Could not start conversation');
      var resp = await fetch(window.API_BASE + '/api/cody', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: text, conversation_id: cid })
      });
      var data = await resp.json();
      removeTyping();
      // Cody returns { data: { content: '...', machine: true } }
      var reply = (data.data && data.data.content)
        ? data.data.content
        : (data.message || data.content || data.text || 'Sorry, I could not get a response right now.');
      addMsg(reply, 'bot');
    } catch(err) {
      removeTyping();
      addMsg("Sorry, I'm having trouble connecting. Please try again.", 'bot');
    }
  }
